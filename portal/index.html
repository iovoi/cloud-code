<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1115" />
<title>Claude Portal</title>
<style>
  :root { --bg:#0f1115; --panel:#161a22; --panel2:#1c2230; --line:#272d3a; --txt:#e6e8ee; --mut:#8a93a6; --acc:#6c8cff; --you:#2a3346; --bot:#1d2430; }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; overscroll-behavior:none; }
  body { background:var(--bg); color:var(--txt); font:14px/1.5 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif; display:flex; }

  /* ---------- sidebar ---------- */
  #sidebar { width:260px; background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; flex-shrink:0; }
  #sidebar .new { margin:12px; padding:10px 12px; background:var(--acc); color:#fff; border:0; border-radius:8px; font-weight:600; cursor:pointer; }
  #sidebar .new:hover { filter:brightness(1.08); }
  #sessions { overflow-y:auto; padding:0 8px 12px; flex:1; }
  .sess { padding:9px 10px; border-radius:8px; cursor:pointer; color:var(--mut); margin-bottom:2px; display:flex; align-items:center; justify-content:space-between; gap:6px; }
  .sess:hover { background:var(--panel2); color:var(--txt); }
  .sess.active { background:var(--panel2); color:var(--txt); }
  .sess .t { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .sess .x { opacity:0; font-size:12px; padding:2px 5px; border-radius:6px; flex-shrink:0; }
  .sess:hover .x { opacity:.7; }
  .sess .x:hover { opacity:1; background:#3a2030; color:#ff9b9b; }

  /* ---------- main ---------- */
  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #topbar { height:44px; border-bottom:1px solid var(--line); display:flex; align-items:center; padding:0 16px; color:var(--mut); font-size:13px; gap:8px; }
  #menuBtn { display:none; background:transparent; border:0; color:var(--txt); font-size:20px; line-height:1; cursor:pointer; padding:4px 6px; border-radius:6px; }
  #menuBtn:hover { background:var(--panel2); }
  #messages { flex:1; overflow-y:auto; padding:20px 0; }
  .msg { max-width:820px; margin:0 auto 16px; padding:0 20px; }
  .bubble { padding:11px 14px; border-radius:10px; white-space:pre-wrap; word-wrap:break-word; overflow-wrap:anywhere; }
  .msg.user .bubble { background:var(--you); }
  .msg.bot .bubble { background:var(--bot); border:1px solid var(--line); }
  .msg .role { font-size:11px; color:var(--mut); margin-bottom:4px; text-transform:uppercase; letter-spacing:.05em; }
  .tool { max-width:820px; margin:0 auto 8px; padding:0 20px; }
  .tool span { font-size:12px; color:var(--acc); background:var(--panel2); border:1px solid var(--line); padding:3px 8px; border-radius:6px; display:inline-block; max-width:100%; overflow:hidden; text-overflow:ellipsis; }
  #composer { border-top:1px solid var(--line); padding:14px 20px 18px; padding-bottom:max(18px, env(safe-area-inset-bottom)); }
  #composer form { max-width:820px; margin:0 auto; display:flex; gap:10px; align-items:flex-end; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:8px 10px; }
  #composer textarea { flex:1; background:transparent; color:var(--txt); border:0; resize:none; outline:0; font:inherit; max-height:160px; }
  #composer button { background:var(--acc); color:#fff; border:0; border-radius:8px; padding:8px 16px; font-weight:600; cursor:pointer; flex-shrink:0; }
  #composer button:disabled { opacity:.5; cursor:not-allowed; }
  .empty { color:var(--mut); text-align:center; margin-top:60px; padding:0 20px; }
  .err { color:#ff9b9b; }

  /* ---------- overlay backdrop (mobile drawer) ---------- */
  #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:20; }

  /* ---------- responsive: phones / narrow tablets ---------- */
  @media (max-width: 760px) {
    body { flex-direction: row; } /* keep flex; sidebar becomes fixed drawer */
    #sidebar {
      position: fixed; top:0; left:0; bottom:0; z-index:30;
      transform: translateX(-100%); transition: transform .22s ease;
      box-shadow: 2px 0 14px rgba(0,0,0,.45);
    }
    #sidebar.open { transform: translateX(0); }
    #overlay.show { display:block; }
    #menuBtn { display:block; }
    #messages { padding:16px 0; }
    .msg, .tool { padding:0 14px; }
    #composer { padding:10px 12px 14px; }
    #topbar { padding:0 10px; }
    /* avoid iOS auto-zoom on focus (needs >=16px) */
    #composer textarea { font-size:16px; }
    body { font-size:15px; }
  }
  @media (max-width: 480px) {
    #composer button { padding:8px 12px; }
  }
</style>
</head>
<body>
  <div id="overlay"></div>
  <aside id="sidebar">
    <button class="new" id="newBtn">+ New chat</button>
    <div id="sessions"></div>
  </aside>
  <main id="main">
    <div id="topbar">
      <button id="menuBtn" aria-label="Menu">☰</button>
      <span id="curTitle">Claude Portal</span><span id="meta"></span>
    </div>
    <div id="messages"></div>
    <div id="composer">
      <form id="f">
        <textarea id="input" rows="1" placeholder="Message Claude…" autofocus></textarea>
        <button id="send" type="submit">Send</button>
      </form>
    </div>
  </main>

<script>
const $ = (s) => document.querySelector(s);
let current = null;       // current session id (cs_...)
let sending = false;

const sidebar = $('#sidebar');
const overlay = $('#overlay');
const sessionsEl = $('#sessions');
const messagesEl = $('#messages');
const inputEl = $('#input');
const sendBtn = $('#send');

const isMobile = () => window.matchMedia('(max-width: 760px)').matches;
function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
$('#menuBtn').onclick = () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
overlay.onclick = closeSidebar;

async function loadSessions() {
  const r = await fetch('/api/sessions');
  const data = await r.json();
  sessionsEl.innerHTML = '';
  (data.sessions || []).forEach((s) => {
    const row = document.createElement('div');
    row.className = 'sess' + (s.id === current ? ' active' : '');
    const t = document.createElement('div'); t.className = 't'; t.textContent = s.title || '(untitled)';
    const x = document.createElement('div'); x.className = 'x'; x.textContent = '✕';
    x.onclick = async (e) => { e.stopPropagation(); await fetch('/api/session/' + s.id, { method:'DELETE' }); if (current === s.id) { current = null; renderMessages([]); } loadSessions(); };
    row.onclick = () => { current = s.id; renderMessages(s.messages || []); $('#curTitle').textContent = s.title || '(untitled)'; if (isMobile()) closeSidebar(); loadSessions(); };
    row.appendChild(t); row.appendChild(x);
    sessionsEl.appendChild(row);
  });
}

function renderMessages(list) {
  messagesEl.innerHTML = '';
  $('#meta').textContent = '';
  if (!list.length) { const e = document.createElement('div'); e.className = 'empty'; e.textContent = 'Start a new conversation — Claude Code runs in /home/developer/workspace.'; messagesEl.appendChild(e); return; }
  list.forEach((m) => addMessage(m.role, m.text));
}
function addMessage(role, text) {
  const wrap = document.createElement('div'); wrap.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
  const roleEl = document.createElement('div'); roleEl.className = 'role'; roleEl.textContent = role === 'user' ? 'You' : 'Claude';
  const b = document.createElement('div'); b.className = 'bubble'; b.textContent = text;
  wrap.appendChild(roleEl); wrap.appendChild(b);
  messagesEl.appendChild(wrap); messagesEl.scrollTop = messagesEl.scrollHeight;
  return b;
}
function addTool(name) {
  const wrap = document.createElement('div'); wrap.className = 'tool';
  const s = document.createElement('span'); s.textContent = '🔧 ' + name;
  wrap.appendChild(s); messagesEl.appendChild(wrap); messagesEl.scrollTop = messagesEl.scrollHeight;
}

inputEl.addEventListener('input', () => { inputEl.style.height = 'auto'; inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px'; });

$('#newBtn').onclick = () => { current = null; renderMessages([]); $('#curTitle').textContent = 'New chat'; inputEl.focus(); if (isMobile()) closeSidebar(); loadSessions(); };

$('#f').onsubmit = async (e) => {
  e.preventDefault();
  const text = inputEl.value.trim();
  if (!text || sending) return;
  sending = true; sendBtn.disabled = true;
  inputEl.value = ''; inputEl.style.height = 'auto';
  if (isMobile()) inputEl.blur();
  addMessage('user', text);
  const botBubble = addMessage('bot', '');
  let got = '';
  try {
    const resp = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ sessionId: current, message: text }) });
    const reader = resp.body.getReader(); const dec = new TextDecoder(); let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream:true });
      const parts = buf.split('\n\n'); buf = parts.pop();
      for (const part of parts) {
        let evt = 'message', dat = '';
        for (const ln of part.split('\n')) { if (ln.startsWith('event: ')) evt = ln.slice(7); else if (ln.startsWith('data: ')) dat += ln.slice(6); }
        const data = dat ? JSON.parse(dat) : {};
        if (evt === 'session') { current = data.id; if (data.title) $('#curTitle').textContent = data.title; }
        else if (evt === 'text') { got += data.text; botBubble.textContent = got; messagesEl.scrollTop = messagesEl.scrollHeight; }
        else if (evt === 'tool') { addTool(data.name); }
        else if (evt === 'done') { if (data.usage) $('#meta').textContent = `in ${data.usage.input_tokens ?? '?'}→${data.usage.output_tokens ?? '?'} tok`; }
        else if (evt === 'error') { botBubble.className = 'bubble err'; botBubble.textContent = (botBubble.textContent || '') + '\n[error: ' + data.error + ']'; }
      }
    }
  } catch (err) { botBubble.className = 'bubble err'; botBubble.textContent = '[request failed: ' + err + ']'; }
  sending = false; sendBtn.disabled = false;
  loadSessions();
  inputEl.focus();
};

loadSessions();
renderMessages([]);
</script>
</body>
</html>
